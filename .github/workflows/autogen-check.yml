name: Autogen Check

on:
  workflow_call:
    outputs:
      autogen:
        description: "Whether the push was made by github-actions[bot]"
        value: ${{ jobs.autogen-check.outputs.autogen }}

jobs:
  autogen-check:
    runs-on: ubuntu-latest
    outputs:
      autogen: ${{ steps.check_autogen.outputs.autogen }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if commit is autogenerated
        id: check_autogen
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          AUTHOR_LOGIN=$(gh api repos/$REPO/commits/$SHA --jq '.author.login')
          if [ "$AUTHOR_LOGIN" = "github-actions[bot]" ]; then
            echo "autogen=true" >> $GITHUB_OUTPUT
          else
            echo "autogen=false" >> $GITHUB_OUTPUT
            echo "Commit author is $AUTHOR_LOGIN, not github-actions[bot]. Skipping publish steps."
          fi
